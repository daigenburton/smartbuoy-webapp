version: "3.8"
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend
    ports:
      - "${FRONTEND_PORT}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
      - sqlite_data:/app/prisma/data
    environment:
      - NODE_ENV=${NODE_ENV}
      - BACKEND_API_BASE_URL=${BACKEND_API_BASE_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - DATABASE_URL=file:/app/prisma/data/prod.db
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped

  backend:
    build:
      context: ./backend/SmartBuoy
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./backend/SmartBuoy/src:/app/src
      - ./backend/SmartBuoy/build.gradle:/app/build.gradle
      - ./backend/SmartBuoy/settings.gradle:/app/settings.gradle
      - ./backend/SmartBuoy/.git:/app/.git:ro
      - gradle-cache:/home/gradle/.gradle
      - ${CERTS_DIR:-./certs}:/certs:ro
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - SQS_QUEUE_NAME=${SQS_QUEUE_NAME}
      - INFLUXDB_ENABLED=${INFLUXDB_ENABLED}
      - INFLUXDB_URL=${INFLUXDB_URL}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN}
      - DOCKER_INFLUXDB_INIT_ORG=${DOCKER_INFLUXDB_INIT_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${DOCKER_INFLUXDB_INIT_BUCKET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - MQTT_ENABLED=${MQTT_ENABLED:-false}
      - AWS_IOT_ENDPOINT=${AWS_IOT_ENDPOINT}
      - AWS_IOT_CLIENT_ID=${AWS_IOT_CLIENT_ID:-smartbuoy-backend}
      - AWS_IOT_CERT_PATH=${AWS_IOT_CERT_PATH}
      - AWS_IOT_KEY_PATH=${AWS_IOT_KEY_PATH}
      - AWS_IOT_ROOT_CA_PATH=${AWS_IOT_ROOT_CA_PATH}
      - JAVA_TOOL_OPTIONS=-Xmx512m -Xms256m
    deploy:
      resources:
        limits:
          memory: 768m
    restart: unless-stopped
    command: gradle bootRun --no-daemon

  influxdb:
    image: influxdb
    container_name: influxdb
    ports:
      - "${INFLUXDB_PORT}:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=${DOCKER_INFLUXDB_INIT_MODE}
      - DOCKER_INFLUXDB_INIT_USERNAME=${DOCKER_INFLUXDB_INIT_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${DOCKER_INFLUXDB_INIT_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${DOCKER_INFLUXDB_INIT_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${DOCKER_INFLUXDB_INIT_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN}
    deploy:
      resources:
        limits:
          memory: 400m
    restart: unless-stopped

volumes:
  influxdb-data:
  influxdb-config:
  gradle-cache:
  sqlite_data:
