server.port=8000
spring.application.name=SmartBuoy

# InfluxDB - all values injected from environment variables
influxdb.enabled=${INFLUXDB_ENABLED:false}
influxdb.url=${INFLUXDB_URL:http://influxdb:8086}
influxdb.token=${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN}
influxdb.org=${DOCKER_INFLUXDB_INIT_ORG}
influxdb.bucket=${DOCKER_INFLUXDB_INIT_BUCKET}

# SQS
sqs.queue-name=${SQS_QUEUE_NAME:smartbuoy}

# CORS - comma-separated list of allowed origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:80}

# MQTT / AWS IoT Core — set MQTT_ENABLED=true and provide cert paths to activate
mqtt.enabled=${MQTT_ENABLED:false}
mqtt.endpoint=${AWS_IOT_ENDPOINT:localhost}
mqtt.client-id=${AWS_IOT_CLIENT_ID:smartbuoy-backend}
mqtt.cert-path=${AWS_IOT_CERT_PATH:/certs/device.crt.pem}
mqtt.key-path=${AWS_IOT_KEY_PATH:/certs/device.private.key}
mqtt.root-ca-path=${AWS_IOT_ROOT_CA_PATH:/certs/AmazonRootCA1.pem}
mqtt.thing-name=${AWS_IOT_THING_NAME:esp32}
